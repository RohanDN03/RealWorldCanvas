# RealWorldCanvas deployment configuration for Render

services:
  # 1. PostgreSQL Database
  - type: pserv
    name: database
    env: postgres
    plan: free
    postgres:
      version: 15

  # 2. HTTPS Backend (REST API)
  - type: web
    name: https-backend
    env: node
    plan: free
    rootDir: ./
    buildCommand: |
      pnpm install
      pnpm turbo build --filter=https-backend...
    startCommand: pnpm --filter https-backend start
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # This will generate a secure, random secret
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: excelidraw-frontend
          property: url
      - key: PORT
        value: 3002

  # 3. WebSocket Backend
  - type: web
    name: ws-backend
    env: node
    plan: free
    rootDir: ./
    buildCommand: |
      pnpm install
      pnpm turbo build --filter=ws-backend...
    startCommand: pnpm --filter ws-backend start
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: database
          property: connectionString
      - key: JWT_SECRET
        fromService:
          type: web
          name: https-backend
          property: envVar.JWT_SECRET
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: excelidraw-frontend
          property: url
      - key: PORT
        value: 3001

  # 4. Next.js Frontend
  - type: web
    name: excelidraw-frontend
    env: node
    plan: free
    rootDir: ./
    buildCommand: |
      pnpm install
      pnpm --filter excelidraw-frontend build
    startCommand: pnpm --filter excelidraw-frontend start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: https-backend
          property: url
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: ws-backend
          property: url
