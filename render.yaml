# RealWorldCanvas deployment configuration for Render
envVarGroups:
  - name: shared-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true

databases:
  # 1. PostgreSQL Database
  - name: database
    plan: free

services:
  # 2. HTTPS Backend (REST API)
  - type: web
    name: https-backend
    env: node
    plan: free
    rootDir: ./
    buildCommand: |
      pnpm install
      pnpm turbo build --filter=https-backend...
    startCommand: pnpm --filter https-backend start
    envVars:
      - fromGroup: shared-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: PORT
        value: 3002
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: excelidraw-frontend
          property: host

  # 3. WebSocket Backend
  - type: web
    name: ws-backend
    env: node
    plan: free
    rootDir: ./
    buildCommand: |
      pnpm install
      pnpm turbo build --filter=ws-backend...
    startCommand: pnpm --filter ws-backend start
    envVars:
      - fromGroup: shared-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: PORT
        value: 3001
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: excelidraw-frontend
          property: host

  # 4. Next.js Frontend
  - type: web
    name: excelidraw-frontend
    env: node
    plan: free
    rootDir: ./
    buildCommand: |
      pnpm install
      pnpm --filter excelidraw-frontend build
    startCommand: pnpm --filter excelidraw-frontend start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: https-backend
          property: host
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: ws-backend
          property: host
