# RealWorldCanvas deployment configuration for Render
databases:
  - name: database
    plan: free
    databaseName: realworldcanvas
    user: realworldcanvas

services:
  # 1. HTTPS Backend (REST API)
  - type: web
    name: https-backend
    runtime: node
    plan: free
    buildCommand: |
      pnpm install
      pnpm turbo build --filter=https-backend...
    startCommand: pnpm --filter https-backend start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: PORT
        value: 3002
      - key: JWT_SECRET
        generateValue: true

  # 2. WebSocket Backend
  - type: web
    name: ws-backend
    runtime: node
    plan: free
    buildCommand: |
      pnpm install
      pnpm turbo build --filter=ws-backend...
    startCommand: pnpm --filter ws-backend start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: database
          property: connectionString
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true

  # 3. Next.js Frontend
  - type: web
    name: excelidraw-frontend
    runtime: node
    plan: free
    buildCommand: |
      pnpm install
      pnpm --filter excelidraw-frontend build
    startCommand: pnpm --filter excelidraw-frontend start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: https-backend
          property: url
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          type: web
          name: ws-backend
          property: url
